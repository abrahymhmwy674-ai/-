<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دليل الشركات الذكي</title>
    <style>
        :root {
            --bg: #080a0f;
            --card: #121620;
            --accent: #00d2ff;
            --text: #ffffff;
            --muted: #94a3b8;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at top, #1e293b 0%, #080a0f 100%);
            color: var(--text);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 50px;
            text-align: center;
            background: linear-gradient(to right, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1200px;
        }

        .card {
            background: var(--card);
            border-radius: 20px;
            padding: 30px 20px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(45deg, transparent, rgba(0, 210, 255, 0.05));
            pointer-events: none;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: var(--accent);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
        }

        .logo-box {
            width: 110px;
            height: 110px;
            background: #ffffff;
            border-radius: 24px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
        }

        .card:hover .logo-box {
            transform: scale(1.1) rotate(5deg);
        }

        .logo-box img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .card h3 {
            margin: 10px 0;
            font-size: 1.3rem;
            font-weight: 700;
        }

        .card p {
            color: var(--muted);
            font-size: 0.9rem;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .btn {
            background: var(--accent);
            color: #000;
            padding: 10px 25px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 0.9rem;
            transition: all 0.3s;
            margin-top: auto;
            width: 80%;
        }

        .card:hover .btn {
            background: #fff;
            box-shadow: 0 0 15px var(--accent);
        }

        @media (max-width: 600px) {
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <h1>منصات كفو التقنية</h1>

    <div class="grid" id="mainGrid"></div>

    <script>
        const sites = [
            { url: "https://www.nvssoft.com/", name: "NVSsoft" },
            { url: "https://ligadata.com/", name: "LigaData" },
            { url: "https://trend.ai/", name: "Trend AI" },
            { url: "https://mannaitechnologies.com/", name: "Mannai Tech" },
            { url: "https://cipher.com.sa/", name: "Cipher" },
            { url: "https://www.dpsy.com/", name: "Digital Psychology" },
            { url: "https://tajir.store/", name: "Tajir" },
            { url: "https://prajtec.com/", name: "Prajtec" },
            { url: "https://www.omniya.sy/", name: "Omniya" },
            { url: "https://beacons.ai/qbest", name: "Q-Best" },
            { url: "https://laptophome-sy.com/", name: "Laptop Home" },
            { url: "https://paymera.net/", name: "Paymera" },
            { url: "https://ait-market.com/", name: "AIT Market" },
            { url: "https://albesher-co.com/", name: "Albesher" },
            { url: "https://new-laptop.net/", name: "Hi-Tech" },
            { url: "https://easybooks.me/", name: "Mednizer" },
            { url: "https://ebtechco.com/", name: "EB Tech" },
            { url: "http://www.ishara.sy/", name: "Ishara" },
            { url: "https://studyloops.tech/", name: "StudyLoops" },
            { url: "https://doushesh.com/", name: "Doushesh" },
            { url: "https://pro-wave.net/", name: "Pro Wave" },
            { url: "https://byte-lab.tech/", name: "Byte Lab" },
            { url: "https://www.jsource.sy/", name: "J-Source" },
            { url: "https://icrcompany.net/", name: "ICR Company" },
            { url: "https://links.menuva.co/", name: "Menuva" },
            { url: "https://novagroups.net/", name: "Nova Groups" },
            { url: "https://www.for9a.com/", name: "For9a" },
            { url: "https://www.forsa.ma/", name: "Forsa Academy" }
        ];

        const grid = document.getElementById('mainGrid');

        sites.forEach(site => {
            const domain = new URL(site.url).hostname;
            
            // محرك جوجل لجلب أيقونات المواقع بجودة عالية
            const logoUrl = `https://www.google.com/s2/favicons?sz=128&domain=${domain}`;
            // محرك إضافي كاحتياط
            const backupLogo = `https://logo.clearbit.com/${domain}`;

            const card = document.createElement('a');
            card.className = 'card';
            card.href = site.url;
            card.target = '_blank';

            card.innerHTML = `
                <div class="logo-box">
                    <img src="${logoUrl}" 
                         onerror="this.src='${backupLogo}'; this.onerror=function(){this.src='https://cdn-icons-png.flaticon.com/512/1006/1006363.png'}" 
                         alt="${site.name}">
                </div>
                <h3>${site.name}</h3>
                <p>استكشف الخدمات الرسمية والحلول التي تقدمها شركة ${site.name} عبر موقعها الإلكتروني.</p>
                <div class="btn">زيارة الموقع</div>
            `;
            grid.appendChild(card);
        });
    </script>
</body>
</html>
